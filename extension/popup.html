<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RedeemIt</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #003087;
        --primary-dark: #152d4a;
        --primary-light: #2A2D32;
        --background: #f8fafb;
        --surface: #ffffff;
        --text-primary: #4F81B7;
        --text-secondary: #4F81B7;
        --text-muted: #4F81B7;
        --border: #d4dfe6;
        --success: #2d9e5f;
        --error: #d64545;
      }

      body {
        width: 320px;
        padding: 16px;
        font-family: 'League Spartan', sans-serif;
        background: var(--background);
        color: var(--text-primary);
        margin: 0;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
        margin: 0;
        color: var(--primary);
      }

      p.subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin: 0 0 16px 0;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 10px;
        transition: box-shadow 0.2s, border-color 0.2s;
      }

      .card:hover {
        border-color: var(--primary-light);
        box-shadow: 0 2px 12px rgba(0, 0, 128, 0.1);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .card-logo {
        width: 28px;
        height: 28px;
        object-fit: contain;
        border-radius: 6px;
      }

      .card-brand {
        font-weight: 600;
        font-size: 15px;
        color: var(--text-primary);
      }

      .card-balance {
        font-size: 14px;
        color: var(--text-primary);
        font-weight: 500;
        margin-bottom: 2px;
      }

      .card-expiry {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 12px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-family: 'League Spartan', sans-serif;
        font-weight: 600;
        transition: background 0.2s, transform 0.1s;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
      }

      /* Logout button */
      #logout-btn {
        width: auto;
        padding: 6px 12px;
        font-size: 12px;
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }

      #logout-btn:hover {
        background: var(--error);
        color: white;
        border-color: var(--error);
      }

      /* Forms */
      .auth-form {
        display: none;
      }

      .auth-form.active {
        display: block;
      }

      .auth-form input {
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 12px;
        border: 2px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        font-family: 'League Spartan', sans-serif;
        box-sizing: border-box;
        background: var(--surface);
        color: var(--text-primary);
        transition: border-color 0.2s;
      }

      .auth-form input:focus {
        outline: none;
        border-color: var(--primary);
      }

      .auth-form input::placeholder {
        color: var(--text-muted);
      }

      .auth-link {
        font-size: 13px;
        color: var(--primary);
        cursor: pointer;
        text-align: center;
        display: block;
        margin-top: 12px;
        font-weight: 500;
      }

      .auth-link:hover {
        text-decoration: underline;
        color: var(--primary-dark);
      }

      /* Error message */
      #error-message {
        display: none;
        background: #fdeaea;
        color: var(--error);
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 12px;
        border: 1px solid rgba(214, 69, 69, 0.2);
      }

      #error-message.active {
        display: block;
      }

      /* Success message */
      #success-message {
        display: none;
        background: #e8f5ee;
        color: var(--success);
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 12px;
        border: 1px solid rgba(45, 158, 95, 0.2);
      }

      #success-message.active {
        display: block;
      }

      /* Loading spinner */
      #loading-spinner {
        display: none;
        text-align: center;
        padding: 24px;
      }

      #loading-spinner.active {
        display: block;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top: 3px solid var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 24px;
        color: var(--text-muted);
        font-size: 14px;
      }

      /* Card Detail View */
      #card-detail {
        display: none;
      }

      #card-detail.active {
        display: block;
      }

      .back-btn {
        width: auto;
        padding: 8px 14px;
        background: var(--background);
        color: var(--text-secondary);
        font-size: 13px;
        margin-bottom: 14px;
        border: 1px solid var(--border);
      }

      .back-btn:hover {
        background: var(--border);
        color: var(--text-primary);
      }

      .detail-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .detail-logo {
        width: 44px;
        height: 44px;
        object-fit: contain;
        border-radius: 8px;
      }

      .detail-brand {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .detail-balance {
        font-size: 28px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 18px;
      }

      .field-row {
        background: var(--background);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 10px;
        border: 1px solid var(--border);
      }

      .field-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
        font-weight: 600;
      }

      .field-content {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .field-value {
        flex: 1;
        font-size: 15px;
        font-family: monospace;
        color: var(--text-primary);
        font-weight: 500;
      }

      .toggle-btn, .copy-btn {
        width: auto;
        padding: 6px 10px;
        font-size: 11px;
        background: var(--primary-light);
      }

      .toggle-btn:hover, .copy-btn:hover {
        background: var(--primary);
      }

      .copy-btn.copied {
        background: var(--success);
      }

      .use-card-btn {
        margin-top: 18px;
        background: var(--success);
      }

      .use-card-btn:hover {
        background: #258750;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>

    <div class="header">
      <h1>RedeemIt</h1>
      <button id="logout-btn" class="hidden">Logout</button>
    </div>
    <p class="subtitle">Your gift cards</p>

    <div id="error-message"></div>
    <div id="success-message"></div>
    <div id="loading-spinner"><div class="spinner"></div></div>

    <!-- Login Form -->
    <div id="login-form" class="auth-form">
      <input type="email" id="login-email" placeholder="Email" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <button id="login-btn">Login</button>
      <span id="show-signup" class="auth-link">Create account</span>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" class="auth-form">
      <input type="email" id="signup-email" placeholder="Email" required />
      <input type="password" id="signup-password" placeholder="Password" required />
      <button id="signup-btn">Sign Up</button>
      <span id="show-login" class="auth-link">Back to login</span>
    </div>

    <div id="cards-list"></div>

    <!-- Card Detail View -->
    <div id="card-detail">
      <button class="back-btn" id="back-btn">← Back</button>
      <div class="detail-header">
        <img class="detail-logo" id="detail-logo" src="" onerror="this.style.display='none'" />
        <span class="detail-brand" id="detail-brand"></span>
      </div>
      <div class="detail-balance" id="detail-balance"></div>
      
      <div class="field-row">
        <div class="field-label">Card Number</div>
        <div class="field-content">
          <span class="field-value" id="card-number-value"></span>
          <button class="toggle-btn" id="toggle-card-number">Show</button>
          <button class="copy-btn" id="copy-card-number">Copy</button>
        </div>
      </div>
      
      <div class="field-row">
        <div class="field-label">PIN</div>
        <div class="field-content">
          <span class="field-value" id="pin-value"></span>
          <button class="toggle-btn" id="toggle-pin">Show</button>
          <button class="copy-btn" id="copy-pin">Copy</button>
        </div>
      </div>
      
      <button class="use-card-btn" id="use-card-detail-btn">Use this card</button>
    </div>

    <script src="api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
